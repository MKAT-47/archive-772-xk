<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC Universe — Character Codex v22.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

:root {
  --ink:       #0d0b0f;
  --ink2:      #1a1520;
  --ink3:      #251e2d;
  --gold:      #c9a84c;
  --gold2:     #e8c96a;
  --gold3:     #f5e0a0;
  --mist:      #b8b0c8;
  --mist2:     #d4cde0;
  --mist3:     #ede8f2;
  --sidebar-w: 280px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Crimson Pro', serif; background: var(--ink); color: var(--mist2); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* TOPBAR */
#topbar { flex-shrink: 0; height: 52px; background: var(--ink2); border-bottom: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; padding: 0 20px; gap: 16px; position: relative; z-index: 100; }
.topbar-title { font-family: 'Cinzel Decorative', serif; font-size: 13px; color: var(--gold); letter-spacing: 0.15em; flex: 1; }
.tb-btn { font-family: 'Cinzel', serif; font-size: 10px; padding: 6px 14px; border: 1px solid rgba(201,168,76,0.35); background: rgba(201,168,76,0.07); color: var(--gold2); cursor: pointer; text-transform: uppercase; transition: 0.2s; }
.tb-btn:hover { background: rgba(201,168,76,0.2); border-color: var(--gold); }

/* LAYOUT */
#app { flex: 1; display: flex; overflow: hidden; }
#sidebar { width: var(--sidebar-w); background: var(--ink2); border-right: 1px solid rgba(201,168,76,0.15); display: flex; flex-direction: column; }
#main { flex: 1; overflow-y: auto; background: var(--ink); padding: 40px; }

/* CHARACTER LIST */
#char-list { flex: 1; overflow-y: auto; padding: 10px 0; }
.char-item { padding: 12px 18px; border-left: 2px solid transparent; cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(201,168,76,0.05); }
.char-item:hover { background: rgba(201,168,76,0.05); }
.char-item.selected { background: rgba(201,168,76,0.12); border-left-color: var(--gold); }
.ci-name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--mist3); letter-spacing: 0.05em; }

/* DOSSIER VIEW */
.v-section { margin-bottom: 30px; border: 1px solid rgba(201,168,76,0.15); background: rgba(255,255,255,0.01); }
.v-section-title { font-family: 'Cinzel', serif; font-size: 10px; color: var(--gold); background: rgba(201,168,76,0.07); padding: 10px 15px; border-bottom: 1px solid rgba(201,168,76,0.15); text-transform: uppercase; letter-spacing: 0.15em; }
.v-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(201,168,76,0.1); }
.v-field { background: var(--ink); padding: 15px; }
.v-field.full { grid-column: span 3; }
.v-label { font-family: 'Cinzel', serif; font-size: 9px; color: var(--gold2); margin-bottom: 6px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.8; }
.v-value { font-size: 15px; line-height: 1.7; color: var(--mist3); white-space: pre-wrap; }

/* BIO CALLOUT (Jacob Kane Standard) */
.bio-highlight { background: rgba(201,168,76,0.04) !important; border-left: 3px solid var(--gold); }
.bio-header-text { font-family: 'Cinzel', serif; font-weight: 700; color: var(--gold3); font-size: 11px; margin-bottom: 8px; display: block; border-bottom: 1px solid rgba(245,224,160,0.2); padding-bottom: 4px; }

/* MODAL */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal-content { background: var(--ink2); border: 1px solid var(--gold); width: 900px; max-height: 95vh; overflow-y: auto; padding: 40px; }
.f-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
label { display: block; font-family: 'Cinzel', serif; font-size: 10px; color: var(--gold); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
input, textarea { width: 100%; background: var(--ink3); border: 1px solid rgba(201,168,76,0.3); color: var(--mist2); padding: 12px; font-family: inherit; font-size: 14px; outline: none; }
input:focus, textarea:focus { border-color: var(--gold); }
</style>
</head>
<body>

<div id="topbar">
  <div class="topbar-title">DC UNIVERSE <span>◈ CHARACTER CODEX V22.1</span></div>
  <button class="tb-btn" onclick="exportData()">💾 Save File</button>
</div>

<div id="app">
  <aside id="sidebar">
    <div style="padding: 15px; border-bottom: 1px solid rgba(201,168,76,0.1);">
      <input type="text" id="search" placeholder="Search archives..." oninput="renderSidebar()">
    </div>
    <div id="char-list"></div>
    <div style="padding: 15px; border-top: 1px solid rgba(201,168,76,0.1);">
      <button class="tb-btn" style="width:100%" onclick="openModal()">+ Add New Entry</button>
    </div>
  </aside>

  <main id="main">
    <div id="dossier-view" style="display:none;">
      <div style="border-left: 4px solid var(--gold); padding-left: 20px; margin-bottom: 40px;">
        <h1 id="v-name" style="font-family:'Cinzel Decorative', serif; font-size: 36px; color:var(--gold); letter-spacing: 2px;"></h1>
        <p id="v-alias" style="font-family:'Cinzel', serif; font-size: 14px; color:var(--mist); text-transform: uppercase; letter-spacing: 4px;"></p>
      </div>
      
      <div id="v-content"></div>
      <div style="margin-top:20px; display:flex; gap:10px;">
        <button class="tb-btn" onclick="editCurrent()">✎ Edit Entry</button>
        <button class="tb-btn" style="color:#e06070; border-color:rgba(224,96,112,0.3);" onclick="deleteCurrent()">✕ Delete</button>
      </div>
    </div>

    <div id="empty-state" style="text-align:center; margin-top:20vh; opacity:0.3;">
      <div style="font-size:60px; color:var(--gold); margin-bottom:20px;">◈</div>
      <div style="font-family:'Cinzel', serif; letter-spacing:5px;">AWAITING DATA INPUT</div>
    </div>
  </main>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2 style="font-family:'Cinzel', serif; color:var(--gold2); margin-bottom:30px; border-bottom:1px solid var(--gold); padding-bottom:10px;">ARCHIVE ENTRY</h2>
    <div class="f-grid">
      <div><label>First Name</label><input type="text" id="f-first"></div>
      <div><label>Surname</label><input type="text" id="f-surname"></div>
      <div><label>Aliases</label><input type="text" id="f-alias"></div>
      <div><label>Moral Alignment</label><input type="text" id="f-align"></div>
    </div>
    <div style="margin-bottom:20px;"><label>Full Background Lore</label><textarea id="f-lore" rows="6"></textarea></div>
    <div style="margin-bottom:20px;"><label>Additional Detail(s)</label><textarea id="f-details" rows="3"></textarea></div>
    <div style="margin-bottom:20px;"><label style="color:var(--gold3);">Brief Character Bio (Jacob Kane Standard)</label><textarea id="f-brief" rows="4"></textarea></div>
    <div style="margin-bottom:30px;"><label>Link To Google Docs Page of Character</label><input type="text" id="f-link"></div>
    
    <div style="display:flex; gap:15px;">
      <button class="tb-btn" style="flex:1; padding:15px; font-weight:bold;" onclick="saveEntry()">Commit to Archives</button>
      <button class="tb-btn" style="flex:0.3;" onclick="closeModal()">Discard</button>
    </div>
  </div>
</div>

<script>
let characters = JSON.parse(localStorage.getItem('dc_codex_v22')) || [];
let currentId = null;

function saveToStore() { localStorage.setItem('dc_codex_v22', JSON.stringify(characters)); }

function renderSidebar() {
  const query = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('char-list');
  list.innerHTML = characters
    .filter(c => `${c.first} ${c.surname} ${c.alias}`.toLowerCase().includes(query))
    .map(c => `
      <div class="char-item ${c.id === currentId ? 'selected' : ''}" onclick="selectChar('${c.id}')">
        <div class="ci-name">${c.first} ${c.surname}</div>
        <div style="font-size:10px; opacity:0.5;">${c.alias || 'Classified'}</div>
      </div>
    `).join('');
}

function selectChar(id) {
  currentId = id;
  const c = characters.find(x => x.id === id);
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('dossier-view').style.display = 'block';
  document.getElementById('v-name').textContent = `${c.first} ${c.surname}`;
  document.getElementById('v-alias').textContent = c.alias || 'Identity Classified';

  const field = (label, val) => val ? `<div class="v-field"><div class="v-label">${label}</div><div class="v-value">${val}</div></div>` : '';
  const full = (label, val, customClass = '') => val ? `<div class="v-field full ${customClass}"><div class="v-label">${label}</div><div class="v-value">${val}</div></div>` : '';

  document.getElementById('v-content').innerHTML = `
    <div class="v-section">
      <div class="v-section-title">◈ Biographical Summary</div>
      <div class="v-grid">
        ${field('Alignment', c.align)}
        ${field('Archive ID', c.id.slice(-6).toUpperCase())}
        ${field('Registry Status', 'Active/Authorised')}
      </div>
    </div>

    <div class="v-section
