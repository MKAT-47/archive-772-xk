<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC Universe — Character Codex v22.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

/* ═══════════════════════════════════════════════════════════════
   CORE VARIABLES & V22 ENGINE STYLING
═══════════════════════════════════════════════════════════════ */
:root {
  --ink: #0d0b0f; --ink2: #1a1520; --ink3: #251e2d; --ink4: #2e2640;
  --gold: #c9a84c; --gold2: #e8c96a; --gold3: #f5e0a0;
  --crimson: #8b1a2e; --crimson2: #b02240;
  --purple: #4a2d6b; --purple2: #6b4a9b;
  --mist: #b8b0c8; --mist2: #d4cde0; --mist3: #ede8f2;
  --sidebar-w: 320px;
}

/* Base Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Crimson Pro', Georgia, serif; background: var(--ink); color: var(--mist2); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Topbar */
#topbar { flex-shrink: 0; height: 56px; background: linear-gradient(90deg, var(--ink) 0%, var(--ink2) 50%, var(--ink) 100%); border-bottom: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; padding: 0 24px; gap: 20px; z-index: 1000; }
.topbar-title { font-family: 'Cinzel Decorative', serif; font-size: 14px; color: var(--gold); letter-spacing: 0.15em; flex: 1; text-transform: uppercase; }
.tb-btn { font-family: 'Cinzel', serif; font-size: 10px; padding: 7px 16px; border: 1px solid rgba(201,168,76,0.4); background: rgba(201,168,76,0.08); color: var(--gold); cursor: pointer; text-transform: uppercase; transition: 0.2s; letter-spacing: 0.1em; }
.tb-btn:hover { background: rgba(201,168,76,0.2); border-color: var(--gold); }

/* Main Layout */
#app-root { flex: 1; display: flex; overflow: hidden; }

/* Sidebar */
#sidebar { width: var(--sidebar-w); background: var(--ink2); border-right: 1px solid rgba(201,168,76,0.15); display: flex; flex-direction: column; }
.sidebar-search { padding: 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(201,168,76,0.1); }
#search-input { width: 100%; background: var(--ink3); border: 1px solid rgba(201,168,76,0.2); color: var(--mist3); padding: 10px; font-family: inherit; font-size: 13px; }

#char-list { flex: 1; overflow-y: auto; padding: 10px 0; }
.char-item { padding: 12px 20px; cursor: pointer; border-left: 3px solid transparent; transition: 0.15s; border-bottom: 1px solid rgba(201,168,76,0.05); }
.char-item:hover { background: rgba(201,168,76,0.06); }
.char-item.active { background: rgba(201,168,76,0.12); border-left-color: var(--gold); }
.ci-name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--mist3); letter-spacing: 0.05em; margin-bottom: 3px; }
.ci-meta { font-size: 10px; color: var(--gold); opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }

/* Content Area */
#main-viewport { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.tab-nav { background: var(--ink2); border-bottom: 1px solid rgba(201,168,76,0.15); display: flex; padding: 0 40px; }
.tab-btn { padding: 15px 20px; font-family: 'Cinzel', serif; font-size: 10px; color: var(--mist); cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; opacity: 0.6; }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); opacity: 1; }

.content-scroll { flex: 1; overflow-y: auto; padding: 40px; background: var(--ink); }

/* High Density Dossier Grid */
.v-section { margin-bottom: 40px; border: 1px solid rgba(201,168,76,0.15); }
.v-section-title { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); background: rgba(201,168,76,0.08); padding: 12px 20px; border-bottom: 1px solid rgba(201,168,76,0.15); text-transform: uppercase; letter-spacing: 0.2em; }
.v-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(201,168,76,0.15); }
.v-field { background: var(--ink); padding: 18px 20px; }
.v-field.full { grid-column: span 3; }
.v-label { font-family: 'Cinzel', serif; font-size: 9px; color: var(--gold2); margin-bottom: 8px; opacity: 0.8; letter-spacing: 0.1em; text-transform: uppercase; }
.v-value { font-size: 15px; line-height: 1.7; color: var(--mist3); white-space: pre-wrap; }

/* Narrative Highlight */
.bio-box { background: rgba(201,168,76,0.04) !important; border-left: 4px solid var(--gold); }
.bio-header { font-family: 'Cinzel', serif; font-weight: 700; color: var(--gold3); font-size: 12px; margin-bottom: 10px; display: block; border-bottom: 1px solid rgba(245,224,160,0.2); padding-bottom: 6px; text-transform: uppercase; }

/* Modal Architecture */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-window { background: var(--ink2); border: 1px solid var(--gold); width: 1000px; max-height: 95vh; overflow-y: auto; padding: 50px; position: relative; }
.f-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.f-group { margin-bottom: 25px; }
label { display: block; font-family: 'Cinzel', serif; font-size: 10px; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; }
input, textarea, select { width: 100%; background: var(--ink3); border: 1px solid rgba(201,168,76,0.3); color: var(--mist3); padding: 12px; font-family: inherit; font-size: 14px; }
input:focus, textarea:focus { border-color: var(--gold); outline: none; }

</style>
</head>
<body id="master-body">

<div id="topbar">
  <div class="topbar-title">DC UNIVERSE ◈ MASTER CODEX <span style="font-size:10px; opacity:0.5;">V22.1</span></div>
  <button class="tb-btn" onclick="saveFile()">💾 Save File</button>
</div>

<div id="app-root">
  <aside id="sidebar">
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="Search archives..." oninput="renderSidebar()">
    </div>
    <div id="char-list"></div>
    <div style="padding: 20px; border-top: 1px solid rgba(201,168,76,0.15);">
      <button class="tb-btn" style="width:100%" onclick="openCharModal()">+ Add New Entry</button>
    </div>
  </aside>

  <main id="main-viewport">
    <div id="empty-state" style="text-align:center; padding-top:20vh; opacity:0.3;">
      <div style="font-size:80px; color:var(--gold); margin-bottom:20px;">◈</div>
      <div style="font-family:'Cinzel', serif; letter-spacing:10px; text-transform:uppercase;">Awaiting Selection</div>
    </div>

    <div id="char-view" style="display:none; height:100%; display:flex; flex-direction:column;">
      <div class="tab-nav">
        <div class="tab-btn active" onclick="switchTab('dossier')">Dossier</div>
        <div class="tab-btn" onclick="switchTab('relationships')">Relationships</div>
        <div class="tab-btn" onclick="switchTab('gallery')">Gallery</div>
      </div>
      
      <div class="content-scroll">
        <div id="v-header" style="margin-bottom:40px; border-left:5px solid var(--gold); padding-left:30px;">
          <h1 id="v-full-name" style="font-family:'Cinzel Decorative', serif; font-size:42px; color:var(--gold); letter-spacing:3px;"></h1>
          <p id="v-alias-sub" style="font-family:'Cinzel', serif; font-size:16px; color:var(--mist); text-transform:uppercase; letter-spacing:5px; margin-top:5px;"></p>
        </div>
        
        <div id="dossier-content"></div>
      </div>
    </div>
  </main>
</div>

<div id="modal-overlay">
  <div class="modal-window">
    <h2 style="font-family:'Cinzel', serif; color:var(--gold2); margin-bottom:40px; border-bottom:1px solid var(--gold); padding-bottom:15px; letter-spacing:3px;">ARCHIVE ENTRY</h2>
    <div class="f-row">
      <div class="f-group"><label>First Name</label><input type="text" id="f-first"></div>
      <div class="f-group"><label>Surname</label><input type="text" id="f-surname"></div>
      <div class="f-group"><label>Aliases</label><input type="text" id="f-alias"></div>
    </div>
    <div class="f-row">
      <div class="f-group"><label>Moral Alignment</label><input type="text" id="f-align"></div>
      <div class="f-group"><label>Base of Operations</label><input type="text" id="f-base"></div>
      <div class="f-group"><label>Status</label><input type="text" id="f-status"></div>
    </div>
    <div class="f-group"><label>Background / History</label><textarea id="f-lore" rows="6"></textarea></div>
    <div class="f-group"><label>Additional Detail(s)</label><textarea id="f-details" rows="3"></textarea></div>
    <div class="f-group"><label style="color:var(--gold3);">Brief Character Bio (High-Density Summary)</label><textarea id="f-brief" rows="4"></textarea></div>
    <div class="f-group"><label>Link To Google Docs Page of Character</label><input type="text" id="f-link"></div>

    <div style="display:flex; gap:20px; margin-top:40px;">
      <button class="tb-btn" style="flex:1; padding:20px; font-weight:700;" onclick="saveCharacter()">Commit to Archives</button>
      <button class="tb-btn" style="flex:0.3;" onclick="closeModal()">Discard</button>
    </div>
  </div>
</div>

<script id="data-script">
/* ═══════════════════════════════════════════════════════════════
   V22 CORE ENGINE SCRIPTING
═══════════════════════════════════════════════════════════════ */
let characters = JSON.parse(localStorage.getItem('dc_codex_v22')) || [];
let selectedId = null;

function saveToStorage() { localStorage.setItem('dc_codex_v22', JSON.stringify(characters)); }

function renderSidebar() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('char-list');
  list.innerHTML = characters
    .filter(c => `${c.first} ${c.surname} ${c.alias}`.toLowerCase().includes(q))
    .map(c => `
      <div class="char-item ${c.id === selectedId ? 'active' : ''}" onclick="selectChar('${c.id}')">
        <div class="ci-name">${c.first} ${c.surname}</div>
        <div class="ci-meta">${c.alias || 'Classified'} ◈ ${c.align || 'Unknown'}</div>
      </div>
    `).join('');
}

function selectChar(id) {
  selectedId = id;
  const c = characters.find(x => x.id === id);
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('char-view').style.display = 'flex';
  document.getElementById('v-full-name').textContent = `${c.first} ${c.surname}`;
  document.getElementById('v-alias-sub').textContent = c.alias || 'Unidentified Asset';
  
  const field = (label, val) => val ? `<div class="v-field"><div class="v-label">${label}</div><div class="v-value">${val}</div></div>` : '';
  const full = (label, val, classes = '') => val ? `<div class="v-field full ${classes}"><div class="v-label">${label}</div><div class="v-value">${val}</div></div>` : '';

  document.getElementById('dossier-content').innerHTML = `
    <div class="v-section">
      <div class="v-section-title">◈ Vital Statistics</div>
      <div class="v-grid">
        ${field('Moral Alignment', c.align)}
        ${field('Base of Operations', c.base)}
        ${field('Registry Status', c.status)}
      </div>
    </div>

    <div class="v-section">
      <div class="v-section-title">◈ Narrative Lore & Information</div>
      <div class="v-grid">
        ${full('Full Narrative History', c.lore)}
        ${full('Additional Detail(s)', c.details)}
        <div class="v-field full bio-box">
          <span class="bio-header">Brief Character Bio:</span>
          <div class="v-value" style="font-weight:600;">${c.brief || 'Awaiting high-density summary...'}</div>
        </div>
        ${full('Documentation Link', c.link ? `<a href="${c.link}" target="_blank" style="color:var(--gold2); text-decoration:none;">Link To Google Docs Page of Character →</a>` : 'Not Linked')}
      </div>
    </div>
    
    <div style="margin-top:30px; display:flex; gap:15px;">
      <button class="tb-btn" onclick="openCharModal(true)">✎ Edit Dossier</button>
      <button class="tb-btn" style="color:#e06070; border-color:rgba(224,96,112,0.2);" onclick="deleteChar()">✕ Purge Entry</button>
    </div>
  `;
  renderSidebar();
}

function openCharModal(isEdit = false) {
  if (isEdit) {
    const c = characters.find(x => x.id === selectedId);
    document.getElementById('f-first').value = c.first;
    document.getElementById('f-surname').value = c.surname;
    document.getElementById('f-alias').value = c.alias;
    document.getElementById('f-align').value = c.align;
    document.getElementById('f-base').value = c.base;
    document.getElementById('f-status').value = c.status;
    document.getElementById('f-lore').value = c.lore;
    document.getElementById('f-details').value = c.details;
    document.getElementById('f-brief').value = c.brief;
    document.getElementById('f-link').value = c.link;
  } else {
    selectedId = null;
    ['f-first','f-surname','f-alias','f-align','f-base','f-status','f-lore','f-details','f-brief','f-link'].forEach(i => document.getElementById(i).value = '');
  }
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

function saveCharacter() {
  const data = {
    id: selectedId || Date.now().toString(),
    first: document.getElementById('f-first').value,
    surname: document.getElementById('f-surname').value,
    alias: document.getElementById('f-alias').value,
    align: document.getElementById('f-align').value,
    base: document.getElementById('f-base').value,
    status: document.getElementById('f-status').value,
    lore: document.getElementById('f-lore').value,
    details: document.getElementById('f-details').value,
    brief: document.getElementById('f-brief').value,
    link: document.getElementById('f-link').value
  };

  const idx = characters.findIndex(x => x.id === data.id);
  if (idx > -1) characters[idx] = data;
  else characters.push(data);

  saveToStorage();
  closeModal();
  selectChar(data.id);
}

function deleteChar() {
  if (confirm("Confirm permanent removal of this dossier?")) {
    characters = characters.filter(x => x.id !== selectedId);
    saveToStorage();
    location.reload();
  }
}

function saveFile() {
  const content = document.documentElement.outerHTML;
  const blob = new Blob([content], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dc_codex_v22_1_${new Date().toISOString().slice(0,10)}.html`;
  a.click();
}

renderSidebar();
</script>

</body>
</html>
