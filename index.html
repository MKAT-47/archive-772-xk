<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC Universe — Character Codex v22.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

:root {
  --ink:       #0d0b0f;
  --ink2:      #1a1520;
  --ink3:      #251e2d;
  --gold:      #c9a84c;
  --gold2:     #e8c96a;
  --gold3:     #f5e0a0;
  --mist:      #b8b0c8;
  --mist2:     #d4cde0;
  --mist3:     #ede8f2;
  --sidebar-w: 300px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Crimson Pro', serif; background: var(--ink); color: var(--mist2); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* TOPBAR */
#topbar { flex-shrink: 0; height: 56px; background: var(--ink2); border-bottom: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; padding: 0 20px; gap: 16px; }
.topbar-title { font-family: 'Cinzel Decorative', serif; font-size: 14px; color: var(--gold); letter-spacing: 0.1em; flex: 1; }
.tb-btn { font-family: 'Cinzel', serif; font-size: 10px; padding: 6px 12px; border: 1px solid var(--gold); background: rgba(201,168,76,0.1); color: var(--gold2); cursor: pointer; text-transform: uppercase; }

/* MAIN LAYOUT */
#app { flex: 1; display: flex; overflow: hidden; }
#sidebar { width: var(--sidebar-w); background: var(--ink2); border-right: 1px solid rgba(201,168,76,0.15); display: flex; flex-direction: column; }
#main { flex: 1; overflow-y: auto; background: var(--ink); padding: 40px; }

/* CHARACTER LIST */
.char-item { padding: 12px 18px; border-bottom: 1px solid rgba(201,168,76,0.05); cursor: pointer; transition: 0.2s; }
.char-item:hover { background: rgba(201,168,76,0.05); }
.char-item.selected { border-left: 3px solid var(--gold); background: rgba(201,168,76,0.1); }
.ci-name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--mist3); }

/* DOSSIER STYLING */
.v-section { margin-bottom: 32px; border: 1px solid rgba(201,168,76,0.15); }
.v-section-title { font-family: 'Cinzel', serif; font-size: 10px; color: var(--gold); background: rgba(201,168,76,0.07); padding: 10px 15px; border-bottom: 1px solid rgba(201,168,76,0.15); text-transform: uppercase; letter-spacing: 0.15em; }
.v-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1px; background: rgba(201,168,76,0.1); }
.v-field { background: var(--ink); padding: 12px 15px; }
.v-label { font-family: 'Cinzel', serif; font-size: 9px; color: var(--gold2); margin-bottom: 5px; opacity: 0.8; letter-spacing: 0.05em; }
.v-value { font-size: 14px; line-height: 1.6; color: var(--mist3); white-space: pre-wrap; }

/* SPECIAL BIO FIELD */
.bio-highlight { background: rgba(201,168,76,0.03) !important; border-left: 2px solid var(--gold2); }

/* MODAL */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal-content { background: var(--ink2); border: 1px solid var(--gold); width: 800px; max-height: 90vh; overflow-y: auto; padding: 30px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.form-field { margin-bottom: 15px; }
label { display: block; font-family: 'Cinzel', serif; font-size: 10px; color: var(--gold); margin-bottom: 5px; }
input, textarea { width: 100%; background: var(--ink3); border: 1px solid rgba(201,168,76,0.3); color: var(--mist2); padding: 8px; font-family: inherit; }
</style>
</head>
<body>

<div id="topbar">
  <div class="topbar-title">DC UNIVERSE ◈ CHARACTER CODEX <span style="font-size:10px; opacity:0.6;">v22.1</span></div>
  <button class="tb-btn" onclick="openModal()">+ Add Character</button>
  <button class="tb-btn" onclick="exportData()">Export JSON</button>
</div>

<div id="app">
  <aside id="sidebar">
    <div style="padding:15px; border-bottom:1px solid rgba(201,168,76,0.1);">
      <input type="text" id="search" placeholder="Search characters..." oninput="renderSidebar()" style="width:100%;">
    </div>
    <div id="char-list" style="overflow-y:auto; flex:1;"></div>
  </aside>

  <main id="main">
    <div id="dossier-view" style="display:none;">
      <h1 id="v-name" style="font-family:'Cinzel', serif; color:var(--gold); margin-bottom:5px;"></h1>
      <p id="v-alias" style="font-style:italic; color:var(--mist); margin-bottom:30px;"></p>
      
      <div id="v-content"></div>
    </div>
    
    <div id="empty-state" style="text-align:center; margin-top:100px; opacity:0.3;">
      <div style="font-size:48px;">◈</div>
      <div style="font-family:'Cinzel', serif; letter-spacing:3px;">Select Dossier</div>
    </div>
  </main>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2 style="font-family:'Cinzel', serif; color:var(--gold2); margin-bottom:20px;">Character Entry</h2>
    <div class="form-grid">
      <div class="form-field"><label>First Name</label><input type="text" id="f-first"></div>
      <div class="form-field"><label>Surname</label><input type="text" id="f-surname"></div>
      <div class="form-field"><label>Aliases</label><input type="text" id="f-alias"></div>
      <div class="form-field"><label>Moral Alignment</label><input type="text" id="f-align"></div>
    </div>
    <div class="form-field"><label>Background / Lore</label><textarea id="f-lore" rows="4"></textarea></div>
    <div class="form-field"><label>Additional Detail(s)</label><textarea id="f-details" rows="2"></textarea></div>
    <div class="form-field"><label style="color:var(--gold3);">Brief Character Bio (High-Density Summary)</label><textarea id="f-brief" rows="3" placeholder="Enter high-density bio here..."></textarea></div>
    <div class="form-field"><label>Link To Google Docs Page of Character</label><input type="text" id="f-link"></div>
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="tb-btn" style="flex:1;" onclick="saveCharacter()">Save Dossier</button>
      <button class="tb-btn" style="background:rgba(200,50,50,0.1); border-color:rgba(200,50,50,0.5);" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
let characters = JSON.parse(localStorage.getItem('dc_codex_v22')) || [];
let currentId = null;

function saveToStorage() {
  localStorage.setItem('dc_codex_v22', JSON.stringify(characters));
}

function renderSidebar() {
  const query = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('char-list');
  list.innerHTML = characters
    .filter(c => `${c.first} ${c.surname} ${c.alias}`.toLowerCase().includes(query))
    .map(c => `
      <div class="char-item ${c.id === currentId ? 'selected' : ''}" onclick="selectChar('${c.id}')">
        <div class="ci-name">${c.first} ${c.surname}</div>
        <div style="font-size:10px; opacity:0.6;">${c.alias || 'No Alias'}</div>
      </div>
    `).join('');
}

function selectChar(id) {
  currentId = id;
  const c = characters.find(x => x.id === id);
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('dossier-view').style.display = 'block';
  document.getElementById('v-name').textContent = `${c.first} ${c.surname}`;
  document.getElementById('v-alias').textContent = c.alias ? `Known as: ${c.alias}` : '';
  
  const field = (label, val) => val ? `<div class="v-field"><div class="v-label">${label}</div><div class="v-value">${val}</div></div>` : '';
  const fullField = (label, val, extraClass = '') => val ? `<div class="v-field ${extraClass}" style="grid-column: 1 / -1;"><div class="v-label">${label}</div><div class="v-value">${val}</div></div>` : '';

  document.getElementById('v-content').innerHTML = `
    <div class="v-section">
      <div class="v-section-title">◈ Narrative Lore & Identity</div>
      <div class="v-grid">
        ${field('Alignment', c.align)}
        ${fullField('Full Background Lore', c.lore)}
        ${fullField('Additional Detail(s)', c.details)}
        ${fullField('Brief Character Bio:', c.brief, 'bio-highlight')}
        ${fullField('Link To Google Docs Page of Character', c.link ? `<a href="${c.link}" target="_blank" style="color:var(--gold2);">Open Document →</a>` : 'Not Linked')}
      </div>
    </div>
  `;
  renderSidebar();
}

function openModal() { document.getElementById('modal').style.display = 'flex'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveCharacter() {
  const data = {
    id: currentId || Date.now().toString(),
    first: document.getElementById('f-first').value,
    surname: document.getElementById('f-surname').value,
    alias: document.getElementById('f-alias').value,
    align: document.getElementById('f-align').value,
    lore: document.getElementById('f-lore').value,
    details: document.getElementById('f-details').value,
    brief: document.getElementById('f-brief').value,
    link: document.getElementById('f-link').value
  };

  const index = characters.findIndex(x => x.id === data.id);
  if (index > -1) characters[index] = data;
  else characters.push(data);

  saveToStorage();
  closeModal();
  renderSidebar();
  selectChar(data.id);
}

function exportData() {
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(characters));
  const downloadAnchor = document.createElement('a');
  downloadAnchor.setAttribute("href", dataStr);
  downloadAnchor.setAttribute("download", "dc_codex_export.json");
  document.body.appendChild(downloadAnchor);
  downloadAnchor.click();
  downloadAnchor.remove();
}

renderSidebar();
</script>
</body>
</html>
